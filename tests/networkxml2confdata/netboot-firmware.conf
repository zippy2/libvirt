##
## dnsmasq conf file created by libvirt
strict-order
domain=example.com
expand-hosts
except-interface=lo
bind-dynamic
interface=virbr1
dhcp-range=192.168.122.2,192.168.122.254,255.255.255.0
dhcp-no-override
dhcp-authoritative
enable-tftp
tftp-root=/var/lib/tftproot
dhcp-match=set:x86,option:client-arch,0
dhcp-boot=tag:x86,pxeboot.img
dhcp-match=set:pc98,option:client-arch,1
dhcp-boot=tag:pc98,pxeboot.img
dhcp-match=set:alpha,option:client-arch,3
dhcp-boot=tag:alpha,pxeboot.img
dhcp-match=set:arc,option:client-arch,4
dhcp-boot=tag:arc,pxeboot.img
dhcp-match=set:intel_lean_client,option:client-arch,5
dhcp-boot=tag:intel_lean_client,pxeboot.img
dhcp-match=set:ia64_efi,option:client-arch,2
dhcp-boot=tag:ia64_efi,pxeboot_efi.img
dhcp-match=set:ia32_efi,option:client-arch,6
dhcp-boot=tag:ia32_efi,pxeboot_efi.img
dhcp-match=set:bc_efi,option:client-arch,7
dhcp-boot=tag:bc_efi,pxeboot_efi.img
dhcp-match=set:xscale_efi,option:client-arch,8
dhcp-boot=tag:xscale_efi,pxeboot_efi.img
dhcp-match=set:x86_64_efi,option:client-arch,9
dhcp-boot=tag:x86_64_efi,pxeboot_efi.img
dhcp-match=set:arm32_efi,option:client-arch,10
dhcp-boot=tag:arm32_efi,pxeboot_efi.img
dhcp-match=set:arm64_efi,option:client-arch,11
dhcp-boot=tag:arm64_efi,pxeboot_efi.img
dhcp-lease-max=253
dhcp-hostsfile=/var/lib/libvirt/dnsmasq/netboot.hostsfile
addn-hosts=/var/lib/libvirt/dnsmasq/netboot.addnhosts
